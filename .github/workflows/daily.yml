name: YouTube Shorts Pipeline

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      upload:
        description: "\u0631\u0641\u0639 \u0625\u0644\u0649 YouTube"
        required: true
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Arabic fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto fonts-noto-cjk fonts-noto-color-emoji
          sudo apt-get install -y fonts-noto-arabic fonts-tajawal fonts-cairo 2>/dev/null || true
          fc-list :lang=ar 2>/dev/null | head -5 || echo "no fc-list"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Decode YouTube credentials
        env:
          YT_CLIENT_SECRETS: ${{ secrets.YT_CLIENT_SECRETS }}
          YT_TOKEN: ${{ secrets.YT_TOKEN }}
        run: |
          python -c "import base64, sys; sys.stdout.buffer.write(base64.b64decode(sys.argv[1]))" "$YT_CLIENT_SECRETS" > client_secrets.json 2>/dev/null || echo "⚠️ no YT_CLIENT_SECRETS"
          python -c "import base64, sys; sys.stdout.buffer.write(base64.b64decode(sys.argv[1]))" "$YT_TOKEN" > token.json 2>/dev/null || echo "⚠️ no YT_TOKEN"

      - name: Run Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UPLOAD_TO_YOUTUBE: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.upload == true)) && 'true' || 'false' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
        shell: bash
        run: |
          set +e
          python -u src/main.py > /tmp/pipeline_stdout.log 2> /tmp/pipeline_stderr.log
          EXIT_CODE=$?
          echo "=== EXIT CODE: $EXIT_CODE ==="
          echo "=== STDOUT ==="
          cat /tmp/pipeline_stdout.log 2>/dev/null
          echo "=== STDERR ==="
          cat /tmp/pipeline_stderr.log 2>/dev/null
          echo "=== LOG FILE ==="
          cat output/log.json 2>/dev/null || echo "No log file"
          echo "=== OUTPUT DIR ==="
          ls -la output/ 2>/dev/null || echo "No output"
          # Send Telegram notification if bot token is set
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_USER_ID" ]; then
            if [ $EXIT_CODE -eq 0 ]; then
              MSG="✅ تم إنتاج الفيديو بنجاح!"
              # Get latest video if exists
              LATEST=$(ls -t output/final_videos/*.mp4 2>/dev/null | head -1)
              if [ -n "$LATEST" ]; then
                SIZE=$(du -h "$LATEST" | cut -f1)
                MSG="$MSG%0A📁 $LATEST ($SIZE)"
              fi
            else
              ERROR=$(tail -5 /tmp/pipeline_stderr.log | head -1 || echo "unknown error")
              MSG="❌ فشل إنتاج الفيديو:%0A$ERROR"
            fi
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_USER_ID}&text=${MSG}&parse_mode=Markdown" > /dev/null 2>&1 || true
          fi
          exit $EXIT_CODE

      - name: Upload video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-video
          path: output/final_videos/
          retention-days: 1

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-logs
          path: |
            output/log.json
            /tmp/pipeline_stdout.log
            /tmp/pipeline_stderr.log
          retention-days: 1
