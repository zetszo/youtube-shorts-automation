name: YouTube Shorts Pipeline

on:
  workflow_dispatch:
    inputs:
      language:
        description: "لغة الفيديو (ar/en)"
        required: true
        default: "ar"
        type: choice
        options:
          - ar
          - en
      upload:
        description: "رفع إلى YouTube بعد التوليد"
        required: true
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Arabic fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto fonts-noto-cjk fonts-noto-color-emoji

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Decode YouTube credentials
        if: ${{ inputs.upload }}
        env:
          YT_CLIENT_SECRETS: ${{ secrets.YT_CLIENT_SECRETS }}
          YT_TOKEN: ${{ secrets.YT_TOKEN }}
        run: |
          python -c "import base64, sys; sys.stdout.buffer.write(base64.b64decode(sys.argv[1]))" "$YT_CLIENT_SECRETS" > client_secrets.json
          python -c "import base64, sys; sys.stdout.buffer.write(base64.b64decode(sys.argv[1]))" "$YT_TOKEN" > token.json

      - name: Run Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UPLOAD_TO_YOUTUBE: ${{ inputs.upload }}
        shell: bash
        run: |
          set +e
          python -u src/main.py ${{ inputs.language }} > /tmp/pipeline_stdout.log 2> /tmp/pipeline_stderr.log
          EXIT_CODE=$?
          echo "=== EXIT CODE: $EXIT_CODE ==="
          echo "=== STDOUT ==="
          cat /tmp/pipeline_stdout.log 2>/dev/null
          echo "=== STDERR ==="
          cat /tmp/pipeline_stderr.log 2>/dev/null
          echo "=== LOG FILE ==="
          cat output/log.json 2>/dev/null || echo "No log file"
          echo "=== OUTPUT DIR ==="
          ls -la output/ 2>/dev/null || echo "No output"
          exit $EXIT_CODE

      - name: Upload video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-video
          path: output/final_videos/
          retention-days: 7

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-logs
          path: |
            output/log.json
            /tmp/pipeline_stdout.log
            /tmp/pipeline_stderr.log
