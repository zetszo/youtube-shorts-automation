name: YouTube Shorts Pipeline

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      upload:
        description: "رفع إلى YouTube"
        required: true
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Arabic fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto fonts-noto-cjk fonts-noto-color-emoji
          sudo apt-get install -y fonts-tajawal fonts-cairo 2>/dev/null || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Decode YouTube credentials
        if: ${{ github.event_name == 'schedule' || inputs.upload }}
        env:
          YT_CLIENT_SECRETS: ${{ secrets.YT_CLIENT_SECRETS }}
          YT_TOKEN: ${{ secrets.YT_TOKEN }}
        run: |
          python -c "import base64, sys; sys.stdout.buffer.write(base64.b64decode(sys.argv[1]))" "$YT_CLIENT_SECRETS" > client_secrets.json
          python -c "import base64, sys; sys.stdout.buffer.write(base64.b64decode(sys.argv[1]))" "$YT_TOKEN" > token.json

      - name: Run Pipeline (Scheduled)
        if: github.event_name == 'schedule'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UPLOAD_TO_YOUTUBE: 'true'
        shell: bash
        run: |
          set +e
          python -u src/main.py > /tmp/pipeline_stdout.log 2> /tmp/pipeline_stderr.log
          EXIT_CODE=$?
          echo "=== EXIT CODE: $EXIT_CODE ==="
          echo "=== STDOUT ==="
          cat /tmp/pipeline_stdout.log 2>/dev/null
          echo "=== STDERR ==="
          cat /tmp/pipeline_stderr.log 2>/dev/null
          echo "=== LOG FILE ==="
          cat output/log.json 2>/dev/null || echo "No log file"
          echo "=== OUTPUT DIR ==="
          ls -la output/ 2>/dev/null || echo "No output"
          exit $EXIT_CODE

      - name: Run Pipeline (Manual)
        if: github.event_name != 'schedule'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UPLOAD_TO_YOUTUBE: ${{ inputs.upload }}
        shell: bash
        run: |
          set +e
          python -u src/main.py > /tmp/pipeline_stdout.log 2> /tmp/pipeline_stderr.log
          EXIT_CODE=$?
          echo "=== EXIT CODE: $EXIT_CODE ==="
          echo "=== STDOUT ==="
          cat /tmp/pipeline_stdout.log 2>/dev/null
          echo "=== STDERR ==="
          cat /tmp/pipeline_stderr.log 2>/dev/null
          echo "=== LOG FILE ==="
          cat output/log.json 2>/dev/null || echo "No log file"
          echo "=== OUTPUT DIR ==="
          ls -la output/ 2>/dev/null || echo "No output"
          exit $EXIT_CODE

      - name: Upload video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-video
          path: output/final_videos/
          retention-days: 1

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-logs
          path: |
            output/log.json
            /tmp/pipeline_stdout.log
            /tmp/pipeline_stderr.log
          retention-days: 1
